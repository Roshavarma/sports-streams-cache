name: Auto-Update Sports Streams Cache

on:
  schedule:
    - cron: '*/15 * * * *' # Triggers automatically every 15 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  fetch-and-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Playwright and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Execute Interception Scraper
        run: python scraper.py

      - name: Commit and Push Updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live_sports_data.json
          # Prevents action from failing if the data hasn't changed
          git commit -m "Automated fetch: Updated live sports JSON" || exit 0
          git push
