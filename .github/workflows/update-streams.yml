name: Update Sports Streams Cache

on:
  schedule:
    # Runs every 5 minutes - the shortest interval allowed by GitHub [citation:2]
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run fetch script
        run: python fetch_streams.py
        
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add streams.json
          # Only commit if the file actually changed
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto-update streams data $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
