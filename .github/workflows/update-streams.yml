name: Update Sports Streams Cache

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Add this permissions block at the top level
permissions:
  contents: write  # This grants write access to push changes

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Explicitly use the token
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run fetch script
        run: python fetch_streams.py
        
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add streams.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto-update streams data $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Pass token to environment
